# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: zrap100000
type: application
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        transformModulesToUI5:
          overridesToOverride: true
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://apps4dq-01.vigent.pt:44300
          client: '300'
        app:
          name: ZRAP100_000
          package: ZRAP_TESTE
          transport: MDVK902118
        exclude:
          - /test/
  resources:
    excludes:
      - /test/**
      - /localService/**
